<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>題庫練習APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="leftPanel">

        <h1>題庫練習APP</h1>

        <p id="statusText">已完成 0 題，剩餘 0 題</p>
        <div id="chapterProgress"></div>

        <label>選擇章節：</label>
        <select id="chapterSelect" onchange="updateStatus()">
            <option value="全部章節">全部章節</option>
        </select>

        <br><br>

        <button onclick="drawQuestion()">隨機抽題</button>
        <button onclick="markDone()">標記已完成</button>
        <button onclick="showChapter()">章節來源</button>
        <button onclick="openManualEdit()">手動修改</button>
        <button onclick="openCustomChapter()">特定章節</button>
        <button onclick="resetProgress()">重置紀錄</button>

        <br><br>

        <img id="questionImage" src="" width="600">

        <br><br>

        <div id="questionName" style="display:none;"></div>

        <hr>

        <div id="manualEditArea" style="display:none;">

            <h2>手動修改</h2>

            <label>選擇要修改的章節：</label>

            <select id="manualChapterSelect"
                    onchange="showManualQuestionList()">

                <option value="">請選擇章節</option>

            </select>

            <br><br>

            <div id="manualQuestionList"></div>

            <br>

            <button onclick="saveManualEdit()">儲存</button>
            <button onclick="closeManualEdit()">關閉</button>

        </div>

        <hr>

        <div id="customChapterArea" style="display:none;">

            <h2>特定章節</h2>

            <p>勾選想要抽題的章節。若全不勾或全勾，則視為全部章節。</p>

            <div id="customChapterList"></div>

            <br>

            <button onclick="saveCustomChapter()">儲存</button>
            <button onclick="closeCustomChapter()">關閉</button>

        </div>

    </div>

    <div class="rightPanel">

        <h1 class="goodLuckText">祝你金榜題名</h1>

        <img src="panda.jpg" class="goodLuckImg">

    </div>

</div>

<script src="questions_data.js"></script>
<script src="app.js"></script>

</body>
</html>
